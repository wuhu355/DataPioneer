<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 500" fill="none">
  <rect width="1920" height="500" rx="14" fill="#0a1628"/>

  <!-- Particle dots -->
  <circle cx="120" cy="80" r="2" fill="rgba(79,172,254,0.6)"/>
  <circle cx="350" cy="150" r="1.5" fill="rgba(79,172,254,0.4)"/>
  <circle cx="600" cy="60" r="2.5" fill="rgba(79,172,254,0.5)"/>
  <circle cx="900" cy="200" r="2" fill="rgba(161,140,209,0.5)"/>
  <circle cx="1200" cy="90" r="1.8" fill="rgba(79,172,254,0.5)"/>
  <circle cx="1500" cy="180" r="2" fill="rgba(79,172,254,0.4)"/>
  <circle cx="1700" cy="70" r="1.5" fill="rgba(161,140,209,0.6)"/>
  <circle cx="1800" cy="300" r="2" fill="rgba(79,172,254,0.5)"/>

  <!-- Lines between particles -->
  <line x1="120" y1="80" x2="350" y2="150" stroke="rgba(79,172,254,0.12)" stroke-width="0.5"/>
  <line x1="600" y1="60" x2="900" y2="200" stroke="rgba(79,172,254,0.1)" stroke-width="0.5"/>
  <line x1="1200" y1="90" x2="1500" y2="180" stroke="rgba(79,172,254,0.1)" stroke-width="0.5"/>

  <!-- Header bar -->
  <rect x="20" y="20" width="1880" height="50" rx="14" fill="rgba(15,35,70,0.3)" stroke="rgba(79,172,254,0.1)" stroke-width="1"/>
  <text x="960" y="52" text-anchor="middle" fill="url(#g)" font-size="18" font-weight="bold" letter-spacing="4">DataPioneer 数据先锋大屏</text>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#a18cd1"/>
    </linearGradient>
  </defs>

  <!-- KPI tiles -->
  <rect x="20" y="85" width="455" height="80" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(79,172,254,0.15)" stroke-width="1"/>
  <text x="40" y="108" fill="#8da4c9" font-size="11">👥 总用户数</text>
  <text x="40" y="145" fill="#4facfe" font-size="28" font-weight="bold" font-family="monospace">206,847</text>

  <rect x="488" y="85" width="455" height="80" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(161,140,209,0.15)" stroke-width="1"/>
  <text x="508" y="108" fill="#8da4c9" font-size="11">📦 总订单数</text>
  <text x="508" y="145" fill="#a18cd1" font-size="28" font-weight="bold" font-family="monospace">48,932</text>

  <rect x="956" y="85" width="455" height="80" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(67,233,123,0.15)" stroke-width="1"/>
  <text x="976" y="108" fill="#8da4c9" font-size="11">💰 总收入</text>
  <text x="976" y="145" fill="#43e97b" font-size="28" font-weight="bold" font-family="monospace">980.5万</text>

  <rect x="1424" y="85" width="476" height="80" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(245,175,25,0.15)" stroke-width="1"/>
  <text x="1444" y="108" fill="#8da4c9" font-size="11">📈 转化率</text>
  <text x="1444" y="145" fill="#f5af19" font-size="28" font-weight="bold" font-family="monospace">5.82%</text>

  <!-- Charts row -->
  <rect x="20" y="180" width="610" height="300" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(79,172,254,0.15)" stroke-width="1"/>
  <text x="40" y="200" fill="#e8f0fe" font-size="12" letter-spacing="2">●  📈  趋 势 分 析  ●</text>

  <rect x="645" y="180" width="610" height="300" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(79,172,254,0.15)" stroke-width="1"/>
  <text x="665" y="200" fill="#e8f0fe" font-size="12" letter-spacing="2">●  🗺️  全 国 分 布  ●</text>

  <rect x="1270" y="180" width="630" height="300" rx="14" fill="rgba(15,35,70,0.35)" stroke="rgba(79,172,254,0.15)" stroke-width="1"/>
  <text x="1290" y="200" fill="#e8f0fe" font-size="12" letter-spacing="2">●  🍩  数 据 分 布  ●</text>

  <!-- Tagline -->
  <text x="960" y="495" text-anchor="middle" fill="#4a6180" font-size="11">⬆ 实际截图效果更佳 · 运行 npm run dev 查看完整大屏</text>
</svg>
